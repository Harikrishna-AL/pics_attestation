<!DOCTYPE html>
<html>
<head>
  <title>Authenticating...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Assets/js/supabaseConfig.js"></script>
    <link rel="stylesheet" href="Assets/css/Admin_common.css">
<script src="Assets/js/message.js" defer></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

  <h2>Authenticating...</h2>
  <p>Please wait...</p>

 <script>

  async function handleLogin() {

    const supabase = window.supabaseClient;

    if (!supabase) {
       showError("Supabase client not loaded.", {
            buttonText: "OK",
            onClose: () => window.location.href = "Login_Admin.html"
        });
    }

    const { data, error } = await supabase.auth.getSession();

    if (error) {
        showError("Session error", {
            buttonText: "OK",
            onClose: () => window.location.href = "Login_Admin.html"
        });
    }

    const session = data.session;

    if (!session) {
      window.location.replace("Login_Admin.html");
      return;
    }

    const role = session.user.user_metadata?.role;

    if (role === "admin") {
      window.location.replace("Dashboard_Admin.html");
    } 
    else if (role === "staff") {
      window.location.replace("Home.html");
    } 
    else {
        showError("No role assigned", {
            buttonText: "OK",
            onClose: () => window.location.href = "Login_Admin.html"
        });
    }
  }

  // Small delay allows Supabase to process token from URL
  setTimeout(handleLogin, 800);

</script>

</body>
</html>
